
<style>

  .add-text-btn {

  .canvas-area {

  .toolbar {

  .toolbar-btn {

</style>

<script>
const LAYOUTS = [
  { name: "One big", css: "grid-template-columns: 1fr; grid-template-rows: 1fr;", cells: 1 },
  { name: "Side by side", css: "grid-template-columns: 1fr 1fr; grid-template-rows: 1fr;", cells: 2 },
  { name: "Top + 2", css: "grid-template-rows: 1.2fr 1fr; grid-template-columns: 1fr 1fr;", cells: 3, spans: [{col:"1/3",row:"1/2"}] },
  { name: "2 + bottom", css: "grid-template-rows: 1fr 1.2fr; grid-template-columns: 1fr 1fr;", cells: 3, spans: [{col:"1/3",row:"2/3",i:2}] },
  { name: "Grid of 4", css: "grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;", cells: 4 },
  { name: "Left + 2", css: "grid-template-columns: 1.3fr 1fr; grid-template-rows: 1fr 1fr;", cells: 3, spans: [{col:"1/2",row:"1/3"}] },
];

const BG_COLORS = [
  "#fff9f5","#f5f0e8","#f0f5f0","#f0f0f8","#fdf5f5",
  "#e8f0f5","#f5ede0","#f0ece8","#e8ece8","#faf5e8",
];

const STICKERS_1 = ["🌊","🏖","🌴","🌅","⛵","🗺","🧭","✈️","🏔","🌺","🦋","🌸"];
const STICKERS_2 = ["❤️","🥰","😊","🎉","⭐","🌟","💫","🎈","🥳","💕","🙌","✨"];
const STICKERS_3 = ["📷","🎒","🍦","🌮","🎵","🎨","📚","🕶","👒","🛍","🍹","🎪"];

let currentLayout = 0;
let selectedBg = 0;
let dragging = null;
let dragOffX = 0, dragOffY = 0;
let elCount = 0;

function buildLayouts() {
  const grid = document.getElementById('layout-grid');
  LAYOUTS.forEach((l, i) => {
    const item = document.createElement('div');
    item.className = 'layout-item' + (i === 0 ? ' selected' : '');
    item.onclick = () => selectLayout(i);
    const preview = document.createElement('div');
    preview.className = 'layout-preview';
    preview.style.cssText = l.css;
    const n = l.cells || 1;
    for (let c = 0; c < n; c++) {
      const cell = document.createElement('div');
      cell.className = 'layout-cell';
      if (l.spans) {
        const sp = l.spans.find(s => (s.i || 0) === c);
        if (sp) {
          if (sp.col) cell.style.gridColumn = sp.col;
          if (sp.row) cell.style.gridRow = sp.row;
        }
      }
      preview.appendChild(cell);
    }
    const name = document.createElement('div');
    name.className = 'layout-name';
    name.textContent = l.name;
    item.appendChild(preview);
    item.appendChild(name);
    grid.appendChild(item);
  });
}

function buildBgSwatches() {
  const cont = document.getElementById('bg-swatches');
  BG_COLORS.forEach((c, i) => {
    const sw = document.createElement('div');
    sw.className = 'bg-swatch' + (i === 0 ? ' selected' : '');
    sw.style.background = c;
    sw.onclick = () => selectBg(i, c);
    cont.appendChild(sw);
  });
}

function buildStickers() {
  [STICKERS_1, STICKERS_2, STICKERS_3].forEach((arr, gi) => {
    const grid = document.getElementById(`sticker-grid-${gi+1}`);
    arr.forEach(s => {
      const el = document.createElement('div');
      el.className = 'sticker-item';
      el.textContent = s;
      el.draggable = true;
      el.addEventListener('dragstart', e => e.dataTransfer.setData('sticker', s));
      el.onclick = () => addSticker(s);
      grid.appendChild(el);
    });
  });
}

function selectLayout(i) {
  currentLayout = i;
  document.querySelectorAll('.layout-item').forEach((el, j) => {
    el.classList.toggle('selected', j === i);
  });
  buildPhotoGrid();
}

function selectBg(i, color) {
  selectedBg = i;
  document.querySelectorAll('.bg-swatch').forEach((el, j) => {
    el.classList.toggle('selected', j === i);
  });
  document.getElementById('page-canvas').style.background = color;
}

function buildPhotoGrid() {
  const grid = document.getElementById('photo-grid');
  grid.innerHTML = '';
  const l = LAYOUTS[currentLayout];
  grid.style.cssText = `position:absolute;inset:20px;display:grid;gap:12px;${l.css}`;
  const n = l.cells || 1;
  for (let c = 0; c < n; c++) {
    const slot = document.createElement('div');
    slot.className = 'photo-slot';
    if (l.spans) {
      const sp = l.spans.find(s => (s.i || 0) === c);
      if (sp) {
        if (sp.col) slot.style.gridColumn = sp.col;
        if (sp.row) slot.style.gridRow = sp.row;
      }
    }
    slot.innerHTML = `<div class="slot-placeholder"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(216,90,48,0.4)" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg><span>Add photo</span></div>`;
    slot.onclick = () => fakeAddPhoto(slot);
    grid.appendChild(slot);
  }
}

const SAMPLE_PHOTOS = [
  'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=400&q=80',
  'https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?w=400&q=80',
  'https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?w=400&q=80',
  'https://images.unsplash.com/photo-1519046904884-53103b34b206?w=400&q=80',
  'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&q=80',
  'https://images.unsplash.com/photo-1501854140801-50d01698950b?w=400&q=80',
];
let photoIdx = 0;

function fakeAddPhoto(slot) {
  const img = document.createElement('img');
  img.src = SAMPLE_PHOTOS[photoIdx % SAMPLE_PHOTOS.length];
  photoIdx++;
  img.onload = () => {
    slot.innerHTML = '';
    slot.appendChild(img);
    slot.classList.add('has-photo');
    slot.onclick = null;
  };
  img.onerror = () => {
    slot.querySelector('.slot-placeholder span').textContent = '(tap to add)';
  };
}

function makeDraggable(el) {
  el.addEventListener('mousedown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'BUTTON' || e.target.isContentEditable) return;
    dragging = el;
    const r = el.getBoundingClientRect();
    const cr = el.parentElement.getBoundingClientRect();
    dragOffX = e.clientX - r.left;
    dragOffY = e.clientY - r.top;
    e.preventDefault();
  });
}

document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const cr = document.getElementById('page-canvas').getBoundingClientRect();
  dragging.style.left = (e.clientX - cr.left - dragOffX) + 'px';
  dragging.style.top = (e.clientY - cr.top - dragOffY) + 'px';
});

document.addEventListener('mouseup', () => { dragging = null; });

document.getElementById('privacy-toggle').addEventListener('change', function() {
  document.getElementById('privacy-label').textContent = this.checked ? 'Private — just you' : 'Shared with family';
});

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', ['layouts','stickers','decor'][i] === name));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
}

function fillPrompt(text) {
  const areas = document.querySelectorAll('.journal-textarea');
  const target = areas[1];
  if (target.value && !target.value.endsWith('\n')) target.value += '\n';
  target.value += text;
  target.focus();
}
